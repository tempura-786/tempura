function getStoreDBForBrand(brand) {
  return STORE_DB[brand] || STORE_DB['Hermès'];
}

let storePickerBrand = 'Hermès';
let storePickerTarget = 'wish'; // 'wish' | 'record' | 'edit'

function openStorePicker(target) {
  storePickerTarget = target;
  const inputId = target === 'wish' ? 'w-store' : target === 'edit' ? 'we-store' : 'r-store';
  const currentId = document.getElementById(inputId).value;
  // Detect brand from current form
  const brandEl = document.getElementById(
    target === 'wish' ? 'w-brand' : target === 'edit' ? 'we-brand' : null
  );
  storePickerBrand = brandEl ? brandEl.value : 'Hermès';
  renderStorePicker(currentId);
  openSheet('store-picker-sheet');
}

function renderStorePicker(selectedStoreId) {
  const selectedStore = state.stores.find(s => s.id === selectedStoreId);
  const selectedName = selectedStore ? selectedStore.name : '';
  const storeMap = getStoreDBForBrand(storePickerBrand);

  let html = '';
  for (const [country, cities] of Object.entries(storeMap)) {
    html += `<div class="sp-section">
      <div class="sp-section-header" onclick="toggleSPSection(this)">
        <span>${country}</span>
        <span class="sp-section-arrow">›</span>
      </div>
      <div class="sp-cities">`;
    for (const [city, stores] of Object.entries(cities)) {
      html += `<div class="sp-city">
        <div class="sp-city-header" onclick="toggleSPCity(this)">
          <span>${city}</span>
          <span class="sp-section-arrow">›</span>
        </div>
        <div class="sp-stores">`;
      for (const store of stores) {
        const isSelected = store === selectedName;
        html += `<div class="sp-store-item ${isSelected ? 'selected' : ''}" onclick="selectStore('${store.replace(/'/g,"\\'")}')">
          ${isSelected ? '✓ ' : ''}${store}
        </div>`;
      }
      html += `</div></div>`;
    }
    html += `</div></div>`;
  }

  // Custom input at bottom
  html += `<div class="sp-custom">
    <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--light);margin-bottom:8px">其他门店（手动输入）</div>
    <input class="sp-custom-input" id="sp-custom-input" placeholder="输入门店名称" value="${selectedName && !isKnownStore(selectedName) ? selectedName : ''}">
    <button class="sp-custom-btn" onclick="selectCustomStore()">确认使用此门店</button>
  </div>`;

  document.getElementById('store-picker-content').innerHTML = html;

  // Auto-expand to selected country/city
  if (selectedName) {
    autoExpandToStore(selectedName);
  }
}

function isKnownStore(name) {
  return Object.values(STORE_DB).some(brandStores =>
    Object.values(brandStores).some(cities =>
      Object.values(cities).some(stores => stores.includes(name))
    )
  );
}

function autoExpandToStore(storeName) {
  const storeMap = getStoreDBForBrand(storePickerBrand);
  for (const [country, cities] of Object.entries(storeMap)) {
    for (const [city, stores] of Object.entries(cities)) {
      if (stores.includes(storeName)) {
        document.querySelectorAll('.sp-section-header').forEach(h => {
          if (h.querySelector('span')?.textContent === country) {
            h.querySelector('.sp-section-arrow').classList.add('open');
            h.nextElementSibling.classList.add('open');
            h.nextElementSibling.querySelectorAll('.sp-city-header').forEach(ch => {
              if (ch.querySelector('span')?.textContent === city) {
                ch.querySelector('.sp-section-arrow').classList.add('open');
                ch.nextElementSibling.classList.add('open');
              }
            });
          }
        });
        return;
      }
    }
  }
}

function toggleSPSection(header) {
  const arrow = header.querySelector('.sp-section-arrow');
  const content = header.nextElementSibling;
  arrow.classList.toggle('open');
  content.classList.toggle('open');
}

function toggleSPCity(header) {
  const arrow = header.querySelector('.sp-section-arrow');
  const content = header.nextElementSibling;
  arrow.classList.toggle('open');
  content.classList.toggle('open');
}

function selectStore(storeName) {
  applyStoreSelection(storeName);
}

function selectCustomStore() {
  const name = document.getElementById('sp-custom-input').value.trim();
  if (!name) { showToast('请输入门店名称'); return; }
  applyStoreSelection(name);
}

function applyStoreSelection(storeName) {
  let store = state.stores.find(s => s.name === storeName);
  if (!store) {
    store = { id: 'st' + Date.now(), name: storeName, city: '' };
    state.stores.push(store);
    save();
  }

  const inputId = storePickerTarget === 'wish' ? 'w-store' : storePickerTarget === 'edit' ? 'we-store' : 'r-store';
  const labelId = storePickerTarget === 'wish' ? 'w-store-label' : storePickerTarget === 'edit' ? 'we-store-label' : 'sr-store-label';
  document.getElementById(inputId).value = store.id;
  const labelEl = document.getElementById(labelId);
  if (labelEl) { labelEl.textContent = storeName; labelEl.style.color = 'var(--charcoal)'; }

  closeSheet('store-picker-sheet');
  if (storePickerTarget === 'record') updateImpact();
  showToast('门店已选择');
}

function editWish(id) {
  const w = state.wishlist.find(w => w.id === id);
  if (!w) return;
  document.getElementById('we-id').value = id;
  const brand = w.brand || 'Hermès';
  document.getElementById('we-brand').value = brand;
  updateWishTypeOptions('we-type', brand);
  updateCatHint('we-cat-hint', brand);
  const types = (BRAND_CONFIG[brand] || BRAND_CONFIG['其他']).types;
  const typeIdx = types.indexOf(w.type);
  document.getElementById('we-type').selectedIndex = Math.max(typeIdx, 0);
  document.getElementById('we-color').value = w.color || '';
  document.getElementById('we-leather').value = w.leather || '';
  document.getElementById('we-hw').value = w.hw || '';
  document.getElementById('we-price').value = w.price || '';
  document.getElementById('we-pri').value = w.priority || 1;
  const statuses = ['计划中','已申请','等待中','已到手'];
  document.getElementById('we-status').selectedIndex = Math.max(statuses.indexOf(w.status), 0);
  document.getElementById('we-store').value = w.storeId || '';
  const storeName = getStoreName(w.storeId);
  document.getElementById('we-store-label').textContent = storeName || '选择门店 →';
  document.getElementById('we-store-label').style.color = storeName ? 'var(--charcoal)' : 'var(--light)';
  openSheet('wish-edit-sheet');
}

function saveWishEdit() {
  const id = document.getElementById('we-id').value;
  const idx = state.wishlist.findIndex(w => w.id === id);
  if (idx === -1) return;
  const price = parseFloat(document.getElementById('we-price').value) || 0;
  if (!price) { showToast('请填写预估价格'); return; }
  state.wishlist[idx] = {
    ...state.wishlist[idx],
    brand: document.getElementById('we-brand').value,
    type: document.getElementById('we-type').value,
    color: document.getElementById('we-color').value,
    leather: document.getElementById('we-leather').value,
    hw: document.getElementById('we-hw').value,
    price,
    priority: parseInt(document.getElementById('we-pri').value),
    status: document.getElementById('we-status').value,
    storeId: document.getElementById('we-store').value,
  };
  save();
  updateDashboard();
  renderWishlist();
  closeSheet('wish-edit-sheet');
  showToast('目标商品已更新');
}

function deleteWish() {
  const id = document.getElementById('we-id').value;
  const w = state.wishlist.find(w => w.id === id);
  if (!w) return;
  if (!confirm(`确认删除「${w.brand ? w.brand + ' ' : ''}${w.type} · ${w.color}」？`)) return;
  state.wishlist = state.wishlist.filter(w => w.id !== id);
  if (state.primaryWishId === id) {
    state.primaryWishId = state.wishlist[0]?.id || null;
  }
  save();
  updateDashboard();
  renderWishlist();
  closeSheet('wish-edit-sheet');
  showToast('目标商品已删除');
}

// ── ARCHIVE FLOW ──────────────────────────────────────────────────
let archiveRecordSelections = {}; // recordId -> bool

function startArchive(wishId) {
  const w = state.wishlist.find(w => w.id === wishId);
  if (!w) return;

  // Auto-select all records from same store, then go straight to archive
  archiveRecordSelections = {};
  const relevant = state.records.filter(r => r.storeId === w.storeId);
  relevant.forEach(r => { archiveRecordSelections[r.id] = true; });

  // If there are records, show the sheet for confirmation
  // If no records, skip straight to Mario
  if (relevant.length > 0) {
    document.getElementById('archive-wish-id').value = wishId;
    document.getElementById('archive-sheet-title').textContent = `归档：${w.type} · ${w.color}`;
    document.getElementById('archive-desc').textContent =
      `以下消费记录将计入此包，默认全部勾选。确认后数据归档，不可撤销。`;
    renderArchiveRecords(w);
    openSheet('archive-sheet');
  } else {
    // No records, archive directly
    document.getElementById('archive-wish-id').value = wishId;
    confirmArchive();
  }
}

function renderArchiveRecords(w) {
  const relevant = state.records.filter(r => r.storeId === w.storeId);
  if (!relevant.length) {
    document.getElementById('archive-records-list').innerHTML =
      '<div style="color:var(--light);font-size:13px;padding:12px 0">该门店暂无消费记录</div>';
    return;
  }
  document.getElementById('archive-records-list').innerHTML = relevant.map(r => `
    <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:0.5px solid var(--cream-dark)">
      <div class="item-check ${archiveRecordSelections[r.id]?'on':''}" onclick="toggleArchiveRecord('${r.id}','${w.id}')" style="flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500;color:var(--charcoal);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.item}</div>
        <div style="font-size:11px;color:var(--light);margin-top:1px">${r.date} · ${r.cat}</div>
      </div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--charcoal);flex-shrink:0">¥${r.amount.toLocaleString()}</div>
    </div>
  `).join('');
}

function toggleArchiveRecord(recordId, wishId) {
  archiveRecordSelections[recordId] = !archiveRecordSelections[recordId];
  const w = state.wishlist.find(w => w.id === wishId);
  if (w) renderArchiveRecords(w);
}

function confirmArchive() {
  const wishId = document.getElementById('archive-wish-id').value;
  const w = state.wishlist.find(w => w.id === wishId);
  if (!w) return;

  // Init archived array if needed
  if (!state.archived) state.archived = [];

  // Move selected records to archived
  const selectedIds = Object.entries(archiveRecordSelections)
    .filter(([,v]) => v).map(([k]) => k);

  const archivedRecords = state.records.filter(r => selectedIds.includes(r.id));
  state.records = state.records.filter(r => !selectedIds.includes(r.id));

  // Archive the wish
  state.archived.push({
    ...w,
    archivedAt: new Date().toISOString().slice(0,10),
    archivedRecords,
  });
  state.wishlist = state.wishlist.filter(ww => ww.id !== wishId);

  // If was primary, switch to first remaining
  if (state.primaryWishId === wishId) {
    state.primaryWishId = state.wishlist[0]?.id || null;
  }

  save();
  closeSheet('archive-sheet');

  // Play Mario!
  const totalSpent = archivedRecords.reduce((s,r) => s+r.amount, 0);
  playMarioAnimation(w, totalSpent);
}

function playMarioAnimation(w, totalSpent) {
  const overlay = document.getElementById('mario-overlay');
  const stage = document.getElementById('mario-stage');
  document.getElementById('mario-sub').textContent = `${w.type} · ${w.color} 到手啦！`;
  document.getElementById('mario-score').textContent = `¥${totalSpent.toLocaleString()}`;
  overlay.classList.add('show');
  stage.innerHTML = '';

  // Pixel bag SVG based on type
  const bagPixelArt = getPixelBagSVG(w.type);

  // Spawn coins
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const coin = document.createElement('div');
      coin.className = 'pixel-coin';
      coin.textContent = '¥';
      coin.style.cssText = `left:${5+Math.random()*88}%;top:-30px;animation-duration:${0.9+Math.random()*1.2}s`;
      stage.appendChild(coin);
      setTimeout(() => coin.remove(), 2500);
    }, i * 70);
  }

  // Spawn pixel bag art floating up from center
  setTimeout(() => {
    const bag = document.createElement('div');
    bag.style.cssText = `position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);animation:bagPop 0.4s steps(2) forwards`;
    bag.innerHTML = bagPixelArt;
    stage.appendChild(bag);
  }, 200);

  // Spawn stars
  const starEmojis = ['⭐','🌟','✨','💛','🏆'];
  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const star = document.createElement('div');
      star.className = 'pixel-star';
      star.textContent = starEmojis[Math.floor(Math.random()*starEmojis.length)];
      star.style.cssText = `left:${10+Math.random()*75}%;top:${30+Math.random()*50}%;animation-duration:${0.5+Math.random()*0.5}s`;
      stage.appendChild(star);
      setTimeout(() => star.remove(), 1200);
    }, 400 + i * 150);
  }

  playMarioSound();
}

function getPixelBagSVG(type) {
  // Pixel art SVGs for different bag types - Mario 8-bit style
  const color = '#FFD700';
  const dark = '#8B6914';
  const shadow = '#5C4000';

  if (type && (type.includes('Birkin') || type.includes('Kelly'))) {
    // Structured bag with handle - Birkin/Kelly style
    return `<svg width="80" height="80" viewBox="0 0 16 16" style="image-rendering:pixelated;width:80px;height:80px">
      <rect x="4" y="2" width="8" height="2" fill="${dark}"/>
      <rect x="5" y="1" width="2" height="2" fill="${dark}"/>
      <rect x="9" y="1" width="2" height="2" fill="${dark}"/>
      <rect x="2" y="4" width="12" height="9" fill="${color}"/>
      <rect x="2" y="4" width="12" height="1" fill="${dark}"/>
      <rect x="2" y="12" width="12" height="1" fill="${shadow}"/>
      <rect x="2" y="4" width="1" height="9" fill="${dark}"/>
      <rect x="13" y="4" width="1" height="9" fill="${shadow}"/>
      <rect x="6" y="7" width="4" height="3" fill="${dark}"/>
      <rect x="7" y="8" width="2" height="2" fill="${color}"/>
      <rect x="7" y="7" width="2" height="1" fill="#C0C0C0"/>
    </svg>`;
  } else if (type && type.includes('Constance')) {
    // Flap bag - Constance style
    return `<svg width="80" height="80" viewBox="0 0 16 16" style="image-rendering:pixelated;width:80px;height:80px">
      <rect x="2" y="2" width="12" height="3" fill="${dark}"/>
      <rect x="2" y="5" width="12" height="8" fill="${color}"/>
      <rect x="2" y="5" width="12" height="1" fill="${dark}"/>
      <rect x="2" y="12" width="12" height="1" fill="${shadow}"/>
      <rect x="2" y="5" width="1" height="8" fill="${dark}"/>
      <rect x="13" y="5" width="1" height="8" fill="${shadow}"/>
      <rect x="6" y="8" width="4" height="2" fill="${dark}"/>
      <rect x="7" y="8" width="2" height="2" fill="#C0C0C0"/>
      <rect x="3" y="1" width="10" height="2" fill="${dark}"/>
    </svg>`;
  } else {
    // Generic bucket/tote - Picotin/Evelyne style
    return `<svg width="80" height="80" viewBox="0 0 16 16" style="image-rendering:pixelated;width:80px;height:80px">
      <rect x="4" y="2" width="2" height="3" fill="${dark}"/>
      <rect x="10" y="2" width="2" height="3" fill="${dark}"/>
      <rect x="3" y="5" width="10" height="8" fill="${color}"/>
      <rect x="3" y="5" width="10" height="1" fill="${dark}"/>
      <rect x="3" y="12" width="10" height="1" fill="${shadow}"/>
      <rect x="3" y="5" width="1" height="8" fill="${dark}"/>
      <rect x="12" y="5" width="1" height="8" fill="${shadow}"/>
      <rect x="4" y="6" width="8" height="1" fill="${dark}" opacity="0.3"/>
      <rect x="6" y="8" width="4" height="2" fill="${dark}" opacity="0.4"/>
    </svg>`;
  }
}

function playMarioSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [523, 659, 784, 1047, 784, 1047, 1319];
    const durations = [0.1, 0.1, 0.1, 0.2, 0.1, 0.1, 0.3];
    let time = ctx.currentTime;
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + durations[i]);
      osc.start(time); osc.stop(time + durations[i]);
      time += durations[i];
    });
  } catch(e) { /* 静默失败 */ }
}

function finishArchive() {
  document.getElementById('mario-overlay').classList.remove('show');
  updateDashboard();
  renderWishlist();
  renderHomeRecords();
  switchTab('home');
}

// TAB SWITCHING
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-item, .tab-center').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  const tab = document.getElementById('tab-'+id);
  if (tab) tab.classList.add('active');
  document.querySelector('.scroll-body').scrollTop = 0;
  if (id==='home') { renderHomeRecords(); }
  if (id==='records') renderRecords();
  if (id==='sa') renderSA();
  if (id==='wishlist') renderWishlist();
  if (id==='scan') { updateSASelect(); resetScan(); }
}

// FILE HANDLING
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    currentImageBase64 = ev.target.result.split(',')[1];
    currentImageType = file.type || 'image/jpeg';
    document.getElementById('upload-zone').style.display = 'none';
    document.getElementById('preview-section').style.display = 'block';
    document.getElementById('preview-img').src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

async function analyzeImage() {
  if (!currentImageBase64) return;
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('analyzing-section').style.display = 'block';
  document.getElementById('scan-results').style.display = 'none';

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: [
          { type: 'image', source: { type: 'base64', media_type: currentImageType, data: currentImageBase64 } },
          { type: 'text', text: `你是爱马仕小票识别助手。从图片提取所有商品，仅返回JSON，无其他文字：{"store":"门店名称（无则写Hermès）","date":"YYYY-MM-DD（无法识别则写${new Date().toISOString().slice(0,10)}）","items":[{"item":"商品完整名称","category":"包/丝巾/配饰/香水/成衣/家居/其他 之一","amount":数字金额不含符号,"count_ratio":true或false（香水食品为false，其他为true）}]}` }
        ]}]
      })
    });
    const data = await resp.json();
    const text = data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    showMultiResults(parsed);
  } catch(err) {
    showMultiResults({ store:'', date:new Date().toISOString().slice(0,10), items:[{item:'',category:'其他',amount:0,count_ratio:true}] });
    showToast('识别失败，请手动填写');
  }
  document.getElementById('analyzing-section').style.display = 'none';
}

let scannedItems = [];

function matchStore(storeName) {
  if (!storeName) return null;
  let matched = state.stores.find(s => s.name.includes(storeName) || storeName.includes(s.name));
  if (!matched) {
    for (const brandStores of Object.values(STORE_DB)) {
      for (const cities of Object.values(brandStores)) {
        for (const stores of Object.values(cities)) {
          const found = stores.find(s => s.includes(storeName) || storeName.includes(s.replace(/爱马仕|香奈儿|劳力士/g,'').trim()));
          if (found) {
            matched = state.stores.find(s => s.name === found);
            if (!matched) { matched = { id:'st'+Date.now(), name:found, city:'' }; state.stores.push(matched); save(); }
            break;
          }
        }
        if (matched) break;
      }
      if (matched) break;
    }
  }
  return matched;
}

function showMultiResults(d) {
  const matched = matchStore(d.store);
  document.getElementById('r-store').value = matched ? matched.id : '';
  document.getElementById('sr-store-label').textContent = matched ? matched.name : '点击更改门店';
  document.getElementById('sr-store-label').style.color = matched ? 'var(--charcoal)' : 'var(--light)';
  document.getElementById('sr-date').value = d.date || new Date().toISOString().slice(0,10);
  updateSASelect();

  scannedItems = (d.items || [{item:d.item||'',category:d.category||'其他',amount:d.amount||0,count_ratio:d.count_ratio!==false}])
    .map((it,i) => ({...it, selected:true, id:'si'+i}));

  renderItemCards();
  updateImpact();
  document.getElementById('scan-results').style.display = 'block';
}

function renderItemCards() {
  const cats = ['包','丝巾','配饰','香水','成衣','家居','其他'];
  document.getElementById('item-cards-list').innerHTML = scannedItems.map((it,i) => `
    <div class="item-card ${it.selected?'selected':''}" id="icard-${i}">
      <div class="item-card-main">
        <div class="item-check ${it.selected?'on':''}" onclick="toggleItem(${i})"></div>
        <div class="item-info">
          <div class="item-name">${it.item||'未识别商品'}</div>
          <div class="item-sub">${it.category} · ${it.count_ratio?'计入累积':'不计入'}</div>
        </div>
        <div class="item-amount">¥${(it.amount||0).toLocaleString()}</div>
        <button class="item-edit-btn" onclick="toggleEditPanel(${i})">编辑</button>
      </div>
      <div class="item-edit-panel" id="ipanel-${i}">
        <div class="item-edit-row">
          <span class="item-edit-label">商品</span>
          <input class="item-edit-input" value="${it.item||''}" oninput="updateItemField(${i},'item',this.value)">
        </div>
        <div class="item-edit-row">
          <span class="item-edit-label">品类</span>
          <select class="item-edit-input" onchange="updateItemField(${i},'category',this.value)">
            ${cats.map(c=>`<option ${c===it.category?'selected':''}>${c}</option>`).join('')}
          </select>
        </div>
        <div class="item-edit-row">
          <span class="item-edit-label">金额</span>
          <input class="item-edit-input" type="number" inputmode="decimal" value="${it.amount||''}" oninput="updateItemField(${i},'amount',parseFloat(this.value)||0);updateImpact()">
        </div>
        <div class="item-ratio-row">
          <span>计入累积</span>
          <label class="toggle"><input type="checkbox" ${it.count_ratio?'checked':''} onchange="updateItemField(${i},'count_ratio',this.checked);updateImpact()"><span class="toggle-slider"></span></label>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleItem(i) {
  scannedItems[i].selected = !scannedItems[i].selected;
  const card = document.getElementById(`icard-${i}`);
  const check = card.querySelector('.item-check');
  card.classList.toggle('selected', scannedItems[i].selected);
  check.classList.toggle('on', scannedItems[i].selected);
  // Update sub text selection state
  updateImpact();
}

function toggleEditPanel(i) {
  document.getElementById(`ipanel-${i}`).classList.toggle('open');
}

function updateItemField(i, field, val) {
  scannedItems[i][field] = val;
  const card = document.getElementById(`icard-${i}`);
  if (card) {
    const name = card.querySelector('.item-name');
    const sub = card.querySelector('.item-sub');
    const amt = card.querySelector('.item-amount');
    if (name) name.textContent = scannedItems[i].item || '未识别商品';
    if (sub) sub.textContent = `${scannedItems[i].category} · ${scannedItems[i].count_ratio?'计入累积':'不计入'}`;
    if (amt) amt.textContent = `¥${(scannedItems[i].amount||0).toLocaleString()}`;
  }
}

function updateImpact() {
  const primary = getPrimaryWish();
  const spent = calcSpentForWish(primary);
  const targetPrice = primary ? primary.price : 250000;
  const before = (spent / targetPrice * 100).toFixed(1);
  // Sum selected items that count toward ratio
  const addAmt = scannedItems.filter(it => it.selected && it.count_ratio).reduce((s,it) => s+it.amount, 0);
  const after = ((spent + addAmt) / targetPrice * 100).toFixed(1);
  const newGap = Math.max(targetPrice - spent - addAmt, 0);
  const afterRatio = parseFloat(after);

  let advice = '';
  if (addAmt > 0 && afterRatio >= 130) {
    advice = `<div style="margin-top:8px;font-size:12px;color:#C0392B;font-weight:500">⚠️ 累积已严重超标，这笔消费没有意义，建议不要记录。</div>`;
  } else if (addAmt > 0 && afterRatio >= 100 && parseFloat(before) < 100) {
    advice = `<div style="margin-top:8px;font-size:12px;color:#2D6A4F;font-weight:500">🎯 保存后累积即达标。之后请停止消费，专注推进申请。</div>`;
  } else if (addAmt > 0 && afterRatio >= 80 && parseFloat(before) < 80) {
    advice = `<div style="margin-top:8px;font-size:12px;color:#8B6914;font-weight:500">✨ 保存后累积将达 80%，可以开始向 SA 表达意向，无需再增加消费。</div>`;
  }

  const bar = document.getElementById('impact-bar');
  bar.innerHTML = `保存后累积将从 <strong>${before}%</strong> 升至 <strong>${after}%</strong>，还差 <strong>${newGap>0?'¥'+newGap.toLocaleString():'已达标'}</strong>${advice}`;
  bar.style.display = scannedItems.length > 0 ? 'block' : 'none';
}

function saveAllItems() {
  const selected = scannedItems.filter(it => it.selected);
  if (!selected.length) { showToast('请至少选择一条记录'); return; }
  const storeId = document.getElementById('r-store').value;
  const store = state.stores.find(s => s.id === storeId);
  const storeName = store ? store.name : '';
  const date = document.getElementById('sr-date').value;
  const sa = document.getElementById('sr-sa').value;

  selected.forEach(it => {
    state.records.push({
      id: 'r'+Date.now()+Math.random(),
      item: it.item || '未命名商品',
      cat: it.category,
      storeId, store: storeName, date,
      amount: it.amount || 0,
      ratio: it.count_ratio,
      sa, note: '',
    });
  });
  state.visits += 1;
  save();
  updateDashboard();
  renderHomeRecords();
  showToast(`已保存 ${selected.length} 条记录`);
  setTimeout(() => switchTab('home'), 1200);
}

function resetScan() {
  currentImageBase64 = null; currentImageType = null; scannedItems = [];
  document.getElementById('upload-zone').style.display = 'block';
  document.getElementById('preview-section').style.display = 'none';
  document.getElementById('analyzing-section').style.display = 'none';
  document.getElementById('scan-results').style.display = 'none';
  document.getElementById('file-input').value = '';
}

// SA
function saveSA() {
  const name = document.getElementById('sa-name').value.trim();
  if (!name) { showToast('请填写姓名'); return; }
  state.sas.push({
    id: 's'+Date.now(),
    name, store: document.getElementById('sa-store').value,
    level: document.getElementById('sa-level').value,
    note: document.getElementById('sa-note').value,
  });
  save(); renderSA(); closeSheet('sa-sheet');
  document.getElementById('sa-name').value=''; document.getElementById('sa-store').value=''; document.getElementById('sa-note').value='';
  showToast('SA 已添加');
}

// WISH
function saveWish() {
  const price = parseFloat(document.getElementById('w-price').value)||0;
  if (!price) { showToast('请填写预估价格'); return; }
  const storeEl = document.getElementById('w-store');
  const brand = document.getElementById('w-brand').value;
  state.wishlist.push({
    id: 'w'+Date.now(),
    brand,
    type: document.getElementById('w-type').value,
    color: document.getElementById('w-color').value,
    leather: document.getElementById('w-leather').value,
    hw: document.getElementById('w-hw').value,
    price,
    priority: parseInt(document.getElementById('w-pri').value),
    status: document.getElementById('w-status').value,
    storeId: storeEl.value,
  });
  save(); renderWishlist(); closeSheet('wish-sheet');
  showToast('目标商品已添加');
}

// SHEETS
function openSheet(id) {
  if (id === 'target-picker') renderTargetPicker();
  if (id === 'wish-sheet') {
    // Init type options and cat hint for default brand
    updateWishTypeOptions('w-type', 'Hermès');
    updateCatHint('w-cat-hint', 'Hermès');
    document.getElementById('w-brand').value = 'Hermès';
    document.getElementById('w-color').value = '';
    document.getElementById('w-leather').value = '';
    document.getElementById('w-hw').value = '';
    document.getElementById('w-price').value = '';
    document.getElementById('w-store').value = '';

}
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.sheet-overlay').forEach(o => {
  o.addEventListener('click', e => { if(e.target===o) o.classList.remove('open'); });
});

// TOAST
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
